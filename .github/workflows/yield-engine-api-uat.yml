name: yield-engine-api-uat

on:
  push:
    branches: [uat]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.YIELDENGINEAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.YIELDENGINEAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.YIELDENGINEAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.YIELDENGINEAPI_REGISTRY_USERNAME }}
          password: ${{ secrets.YIELDENGINEAPI_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/anilmodest/yield-engine-api-uat:${{ github.sha }} .
          docker push ghcr.io/anilmodest/yield-engine-api-uat:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        run: |
          sed -i "s|PLACEHOLDER_SHA|${{ github.sha }}|g" .github/deploy/containerapp.yml
          sed -i "s|yield-engine-api|yield-engine-api-uat|g" .github/deploy/containerapp.yml
          sed -i "s|PLACEHOLDER_ENV|UAT|g" .github/deploy/containerapp.yml
          sed -i "s|PLACEHOLDER_FLASK_SECRET|${{ secrets.FLASK_SECRET_KEY }}|g" .github/deploy/containerapp.yml
          az containerapp update \
            --name yield-engine-api-uat \
            --resource-group YieldEngine \
            --yaml .github/deploy/containerapp.yml
